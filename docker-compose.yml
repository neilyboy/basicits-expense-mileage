version: '3.8'

services:
  pocketledger:
    build: .
    container_name: pocketledger
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - ADMIN_PIN=${ADMIN_PIN:-1234}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - COMPANY_NAME=${COMPANY_NAME:-Basic ITS}
